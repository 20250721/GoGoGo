name: wty Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  Build:
    name: Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle

      - name: Get Tag
        id: var
        run: echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT

      - name: Create local.properties
        run: |
          cat << EOF > local.properties
          MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}
          MAPS_SAFE_CODE=${{ secrets.MAPS_SAFE_CODE }}
          EOF

      - name: Build APK
        run: bash ./gradlew assembleRelease

      # 修复：正确解码签名文件
      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 -d > /tmp/keystore.jks

      # 修复：正确签名 + 正确输出APK路径
      - name: Sign APK
        id: sign_apk
        run: |
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*unsigned*.apk" | head -1)
          SIGNED_APK="${UNSIGNED_APK//unsigned/signed}"
          
          /usr/local/lib/android/sdk/build-tools/*/apksigner sign \
            --ks /tmp/keystore.jks \
            --ks-key-alias ${{ secrets.ALIAS }} \
            --ks-pass pass:${{ secrets.KEY_STORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out $SIGNED_APK \
            $UNSIGNED_APK
          
          # ✅ 正确输出路径给后续步骤使用
          echo "signedReleaseFile=$SIGNED_APK" >> $GITHUB_OUTPUT

      # ✅ 修复上传：固定名称，无任何报错风险
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Release-APK
          path: ${{ steps.sign_apk.outputs.signedReleaseFile }}

      - name: Make Changelog
        uses: ardalanamini/auto-changelog@v4.0.4
        id: changelog
        with:
          github-token: ${{ github.token }}
          commit-types: |
            feat: New Features
            fix: Bug Fixes
            build: Build System & Dependencies
            perf: Performance Improvements
            docs: Documentation
            test: Tests
            refactor: Refactors
            chore: Chores
            ci: CI
            style: Code Style
            revert: Reverts
          default-commit-type: Other Changes
          mention-authors: true
          mention-new-contributors: true
          include-compare-link: true

      - name: Upload Changelog
        uses: actions/upload-artifact@v4
        with:
          name: Changelog
          path: ${{ steps.changelog.outputs.changelog }}

      - name: Release APK
        uses: softprops/gh-release@v2.3.2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          token: ${{ github.token }}
          body: ${{ steps.changelog.outputs.changelog }}
          prerelease: false
          files: ${{ steps.sign_apk.outputs.signedReleaseFile }}